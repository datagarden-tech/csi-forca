# Metrics Service for CSI Forca Node DaemonSet
#
# Exposes Prometheus metrics from node pods.
# This is a headless service (clusterIP: None) so Prometheus discovers
# all node pod endpoints rather than load-balancing to a single node.
# Scrape this endpoint with Prometheus to collect CSI node metrics.
apiVersion: v1
kind: Service
metadata:
  name: csi-forca-node-metrics
  namespace: csi-forca-system
  labels:
    app: csi-forca
    app.kubernetes.io/name: csi-forca
    app.kubernetes.io/component: node-metrics
spec:
  clusterIP: None
  selector:
    app: csi-forca
    app.kubernetes.io/component: node
  ports:
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP
      
