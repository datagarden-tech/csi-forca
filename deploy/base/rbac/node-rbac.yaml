apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-forca-node
  namespace: csi-forca-system
  labels:
    app.kubernetes.io/name: csi-forca
    app.kubernetes.io/component: node
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: csi-forca-node
  labels:
    app.kubernetes.io/name: csi-forca
    app.kubernetes.io/component: node
rules:
  # Node observation for driver self-registration
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: csi-forca-node
  labels:
    app.kubernetes.io/name: csi-forca
    app.kubernetes.io/component: node
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: csi-forca-node
subjects:
  - kind: ServiceAccount
    name: csi-forca-node
    namespace: csi-forca-system