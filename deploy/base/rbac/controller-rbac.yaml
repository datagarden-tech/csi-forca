apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-forca-controller
  namespace: csi-forca-system
  labels:
    app.kubernetes.io/name: csi-forca
    app.kubernetes.io/component: controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: csi-forca-controller
  labels:
    app.kubernetes.io/name: csi-forca
    app.kubernetes.io/component: controller
rules:
  # PersistentVolume management
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  # PersistentVolumeClaim observation
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims/status"]
    verbs: ["patch", "update"]
  # StorageClass observation
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  # CSINode observation
  - apiGroups: ["storage.k8s.io"]
    resources: ["csinodes"]
    verbs: ["get", "list", "watch"]
  # Node observation
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  # Secrets (for future connection credentials from StorageClass)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # Leader election (external-provisioner)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "watch", "list", "delete", "update", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: csi-forca-controller
  labels:
    app.kubernetes.io/name: csi-forca
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: csi-forca-controller
subjects:
  - kind: ServiceAccount
    name: csi-forca-controller
    namespace: csi-forca-system