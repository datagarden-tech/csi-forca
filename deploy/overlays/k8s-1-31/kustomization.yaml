apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Kubernetes 1.31 overlay
# - All APIs stable, no patches required
# - VolumeAttributesClass available (1.31+) - reserved for future
# - No additional features enabled in v0.1

resources:
  - ../../base

namePrefix: ""
nameSuffix: ""

# Overlay-specific labels (v5 transformer)
labels:
  - pairs:
      app.kubernetes.io/version: "1.31"
    includeSelectors: true
    includeTemplates: true
