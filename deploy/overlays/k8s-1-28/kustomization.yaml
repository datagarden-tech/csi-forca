apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Kubernetes 1.28 overlay
# - All APIs stable, no patches required
# - PodDisruptionBudget uses policy/v1 (stable in 1.21+)
# - CSIDriver uses storage.k8s.io/v1 (stable in 1.19+)

resources:
  - ../../base

namePrefix: ""
nameSuffix: ""

# Overlay-specific labels (v5 transformer)
labels:
  - pairs:
      app.kubernetes.io/version: "1.28"
    includeSelectors: true
    includeTemplates: true
